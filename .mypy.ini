[mypy]
strict = True
check_untyped_defs = True
exclude = zx/build/

[mypy-mypyc.*]
follow_untyped_imports = True

# The optional ZX Basic compiler is untyped and may be absent; treat it
# as Any unconditionally so the type of error (attr-defined /
# import-untyped / import-not-found) does not vary by Python version or
# install state. This keeps the import free of per-line # type: ignore.
[mypy-src.zxbc]
ignore_missing_imports = True
follow_imports = skip
