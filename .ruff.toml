# Ruff configuration. Run locally only for now - not wired into CI, which
# still gates on pycodestyle. Transitional: runs alongside pycodestyle,
# which stays the authority. The `ignore` list is the debt ledger - it
# only shrinks over time as rules are lifted one at a time.

target-version = "py310"
line-length = 79

extend-exclude = ["z80", "build"]

[lint]
# E/W pycodestyle, F pyflakes, I isort, B bugbear, UP pyupgrade,
# C4 comprehensions, SIM simplifications, RUF Ruff-native,
# PGH no-blanket-ignores, PTH pathlib-over-os.path,
# TC typing-only imports, Q quote style (single, the house style).
# Deliberately NOT selected: D (docstrings - the public API is documented
# by hand, internals use comments), S (asserts), PL (complexity/magic
# values, lazy-import policy), TD/FIX (tagged-TODO ceremony), EM/TRY003/
# ANN/FBT (opinionated), ICN (import aliases - we spell module names in
# full and use no aliases, so there are none to get wrong).
select = [
    "E", "W", "F", "I", "B", "UP",
    "C4", "SIM", "RUF", "PGH", "PTH", "TC", "Q",
]

# Debt ledger: codes currently violated somewhere in the tree, suppressed
# so the run is green today. Lift one at a time, fix all its sites, then
# delete it from here. This list only shrinks. Counts are at baseline.
ignore = [
    # pathlib over os.path (38 sites, lift as one migration)
    "PTH",     # 38  os.path/os.* -> pathlib (whole family)
    # bugbear (judgement calls - lift last)
    "B006",    #  2  mutable-argument-default
    "B007",    #  4  unused-loop-control-variable
    "B009",    #  2  get-attr-with-constant
    "B024",    #  1  abstract-base-class-without-abstract-method
    "B904",    #  3  raise-without-from-inside-except
    "B905",    #  4  zip-without-explicit-strict
]

[lint.flake8-quotes]
inline-quotes = "single"
multiline-quotes = "single"
docstring-quotes = "double"

# One name per import line (the house style): each import is its own line,
# so a git diff shows exactly which name was added or removed, with no
# reflowing of a combined/parenthesised block. I001 then only sorts.
[lint.isort]
force-single-line = true
