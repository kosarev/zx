name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4.2.2
      with:
        submodules: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        sudo apt-get update
        python -m pip install --upgrade pip
        python -m pip install --upgrade pycodestyle pytest numpy pyyaml mypy types-PyYAML pysdl2
        python -m pip install --upgrade setuptools wheel

    - name: Run pycodestyle and mypy
      run: |
        pycodestyle --exclude=z80 .
        mypy --strict --check-untyped-defs --implicit-reexport zx tests

    - name: Install the package
      run: pip install .

    - name: Run tests
      run: pytest tests

  build-sdist:
    needs: test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4.2.2
      with:
        submodules: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Build sdist
      run: |
        python -m pip install --upgrade build
        python -m build --sdist

    - uses: actions/upload-artifact@v4
      with:
        name: dist-sdist
        path: dist/

  build-wheels:
    needs: test
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4.2.2
      with:
        submodules: true

    - name: Build wheels
      uses: pypa/cibuildwheel@v2.23.3
      with:
        output-dir: dist/

    - uses: actions/upload-artifact@v4
      with:
        name: dist-${{ matrix.os }}
        path: dist/

  build-standalone:
    needs: test
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: dist-standalone-linux
          - os: windows-latest
            artifact: dist-standalone-windows

    steps:
    - uses: actions/checkout@v4.2.2
      with:
        submodules: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install SDL2 system libraries (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update -q
        sudo apt-get install -y libsdl2-2.0-0 libsdl2-ttf-2.0-0 libsdl2-gfx-1.0-0

    - name: Install package and PyInstaller
      run: |
        python -m pip install --upgrade pip pyinstaller
        pip install .

    - name: Build standalone executable (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        echo "from zx import main; main()" > _entry.py
        echo "import os, sys; os.environ.setdefault('PYSDL2_DLL_PATH', sys._MEIPASS)" > _hook_sdl2.py
        SO=$(python -c "
        import sysconfig, glob, os
        sp = sysconfig.get_path('platlib')
        print(glob.glob(os.path.join(sp, 'zx', '_spectrumbase*'))[0])
        ")
        SDL2=$(ldconfig -p | awk '/libSDL2-2\.0\.so\.0/{print $NF}' | head -1)
        SDL2_TTF=$(ldconfig -p | awk '/libSDL2_ttf-2\.0\.so\.0/{print $NF}' | head -1)
        SDL2_GFX=$(ldconfig -p | awk '/libSDL2_gfx-1\.0\.so\.0/{print $NF}' | head -1)
        pyinstaller --onedir --name zx \
          --collect-data zx \
          --collect-all sdl2 \
          --hidden-import zx._spectrumbase \
          --add-binary "$SO:zx" \
          --add-binary "$SDL2:." \
          --add-binary "$SDL2_TTF:." \
          --add-binary "$SDL2_GFX:." \
          --runtime-hook _hook_sdl2.py \
          _entry.py

    - name: Build standalone executable (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        echo "from zx import main; main()" > _entry.py
        $SO = python -c @"
        import sysconfig, glob, os
        sp = sysconfig.get_path('platlib')
        print(glob.glob(os.path.join(sp, 'zx', '_spectrumbase*'))[0])
        "@
        pyinstaller --onedir --name zx `
          --collect-data zx `
          --collect-all sdl2 `
          --collect-all sdl2dll `
          --hidden-import zx._spectrumbase `
          "--add-binary=${SO}:zx" `
          _entry.py

    - name: Smoke-test executable (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: dist/zx/zx help

    - name: Smoke-test executable (Windows)
      if: matrix.os == 'windows-latest'
      run: dist\zx\zx.exe help

    - name: Package (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        VER=${GITHUB_REF_NAME#v}
        tar -czf "zx-${VER}-linux-x86_64.tar.gz" -C dist zx

    - name: Package (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        $VER = $env:GITHUB_REF_NAME -replace '^v', ''
        python -m zipfile -c "zx-${VER}-windows-x86_64.zip" dist/zx

    - uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact }}
        path: zx-*

  # Publishes to PyPI using OIDC Trusted Publishing (no stored tokens).
  #
  # One-time setup required in PyPI:
  #   1. Log in at https://pypi.org and go to your account's
  #      "Publishing" page (or the project page once it exists).
  #   2. Add a new Trusted Publisher with these values:
  #        PyPI project name:  zx
  #        Owner:              kosarev
  #        Repository:         zx
  #        Workflow filename:  release.yml
  #        Environment name:   pypi
  #
  # One-time setup required in GitHub:
  #   Go to Settings → Environments → New environment, name it "pypi".
  release:
    needs: [build-sdist, build-wheels, build-standalone]
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    environment: pypi

    steps:
    - name: Download wheels and sdist
      uses: actions/download-artifact@v4
      with:
        pattern: dist-sdist
        merge-multiple: true
        path: dist/

    - name: Download wheels
      uses: actions/download-artifact@v4
      with:
        pattern: dist-*-latest
        merge-multiple: true
        path: dist/

    - name: Download standalone executables
      uses: actions/download-artifact@v4
      with:
        pattern: dist-standalone-*
        merge-multiple: true
        path: standalone/

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/*
          standalone/*

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
