name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Set up Python
      uses: actions/setup-python@v3
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        sudo apt-get update
        python -m pip install --upgrade pip
        python -m pip install --upgrade pycodestyle pytest numpy pyyaml mypy types-PyYAML pysdl2
        python -m pip install --upgrade setuptools wheel evdev

    - name: Run pycodestyle and mypy
      run: |
        pycodestyle --exclude=z80 .
        mypy --strict --check-untyped-defs --implicit-reexport zx tests

    - name: Install the package
      run: pip install .

    - name: Run tests
      run: pytest tests

  release:
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Set up Python
      uses: actions/setup-python@v3
      with:
        python-version: '3.12'

    - name: Install build
      run: python -m pip install --upgrade build

    - name: Build sdist and wheel
      run: python -m build

    - name: Upload dist artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*

  # Publishes to PyPI using OIDC Trusted Publishing (no stored tokens).
  #
  # One-time setup required in PyPI:
  #   1. Log in at https://pypi.org and go to your account's
  #      "Publishing" page (or the project page once it exists).
  #   2. Add a new Trusted Publisher with these values:
  #        PyPI project name:  zx
  #        Owner:              kosarev
  #        Repository:         zx
  #        Workflow filename:  release.yml
  #        Environment name:   pypi
  #
  # One-time setup required in GitHub:
  #   Go to Settings → Environments → New environment, name it "pypi".
  publish-pypi:
    needs: release
    runs-on: ubuntu-latest

    environment: pypi

    permissions:
      id-token: write

    steps:
    - name: Download dist artifacts
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist/

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
