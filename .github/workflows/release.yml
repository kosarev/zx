name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Set up Python
      uses: actions/setup-python@v3
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        sudo apt-get update
        python -m pip install --upgrade pip
        python -m pip install --upgrade pycodestyle pytest numpy pyyaml mypy types-PyYAML pysdl2
        python -m pip install --upgrade setuptools wheel

    - name: Run pycodestyle and mypy
      run: |
        pycodestyle --exclude=z80 .
        mypy --strict --check-untyped-defs --implicit-reexport zx tests

    - name: Install the package
      run: pip install .

    - name: Run tests
      run: pytest tests

  build-sdist:
    needs: test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Set up Python
      uses: actions/setup-python@v3
      with:
        python-version: '3.12'

    - name: Build sdist
      run: |
        python -m pip install --upgrade build
        python -m build --sdist

    - uses: actions/upload-artifact@v4
      with:
        name: dist-sdist
        path: dist/

  build-wheels:
    needs: test
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Build wheels
      uses: pypa/cibuildwheel@v2.23.3
      with:
        output-dir: dist/

    - uses: actions/upload-artifact@v4
      with:
        name: dist-${{ matrix.os }}
        path: dist/

  build-standalone:
    needs: test
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            archive: zx-linux-x86_64.tar.gz
            artifact: dist-standalone-linux
          - os: windows-latest
            archive: zx-windows-x86_64.zip
            artifact: dist-standalone-windows

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Set up Python
      uses: actions/setup-python@v3
      with:
        python-version: '3.12'

    - name: Install SDL2 system libraries (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update -q
        sudo apt-get install -y libsdl2-2.0-0 libsdl2-ttf-2.0-0 libsdl2-gfx-1.0-0

    - name: Install package and PyInstaller
      run: |
        python -m pip install --upgrade pip pyinstaller
        pip install .

    - name: Build standalone executable (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        echo "from zx import main; main()" > _entry.py
        pyinstaller --onedir --name zx \
          --collect-all zx \
          --collect-all sdl2 \
          _entry.py

    - name: Build standalone executable (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        echo "from zx import main; main()" > _entry.py
        pyinstaller --onedir --name zx `
          --collect-all zx `
          --collect-all sdl2 `
          --collect-all sdl2dll `
          _entry.py

    - name: Smoke-test executable (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: dist/zx/zx help

    - name: Smoke-test executable (Windows)
      if: matrix.os == 'windows-latest'
      run: dist\zx\zx.exe help

    - name: Package (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: tar -czf zx-linux-x86_64.tar.gz -C dist zx

    - name: Package (Windows)
      if: matrix.os == 'windows-latest'
      run: python -m zipfile -c zx-windows-x86_64.zip dist/zx

    - uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact }}
        path: ${{ matrix.archive }}

  # Publishes to PyPI using OIDC Trusted Publishing (no stored tokens).
  #
  # One-time setup required in PyPI:
  #   1. Log in at https://pypi.org and go to your account's
  #      "Publishing" page (or the project page once it exists).
  #   2. Add a new Trusted Publisher with these values:
  #        PyPI project name:  zx
  #        Owner:              kosarev
  #        Repository:         zx
  #        Workflow filename:  release.yml
  #        Environment name:   pypi
  #
  # One-time setup required in GitHub:
  #   Go to Settings → Environments → New environment, name it "pypi".
  release:
    needs: [build-sdist, build-wheels]
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    environment: pypi

    steps:
    - name: Download all dist artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: dist-*
        merge-multiple: true
        path: dist/

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
